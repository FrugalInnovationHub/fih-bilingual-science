name: measurement_game
description: A bilingual Flutter game to teach kids measurements in English and Spanish
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  audioplayers: ^5.2.1
  flutter_animate: ^4.5.0
  flutter_tts: ^4.0.2
  confetti: ^0.7.0
  animated_text_kit: ^4.2.2
  google_fonts: ^4.0.4
  shimmer: ^3.0.0
  flutter_gl: ^0.0.21
  three_dart: ^0.0.16
  three_dart_jsm: ^0.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/

  # fonts:
  #   - family: KidsFont
  #     fonts:
  #       - asset: assets/fonts/kids_font.ttf
