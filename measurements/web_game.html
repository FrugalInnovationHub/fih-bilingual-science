<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Adventure - Bilingual Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #4A90E2, #357ABD, #2E5B8A);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 90%;
        }

        .title {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .language-toggle {
            margin-bottom: 30px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: white;
            color: #2E5B8A;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }

        .question {
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .units-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
        }

        .unit-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            min-width: 120px;
        }

        .unit-emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .unit-name {
            font-size: 1.1em;
            font-weight: bold;
        }

        .unit-value {
            font-size: 1.3em;
            margin-top: 5px;
        }

        .equals {
            font-size: 2em;
            font-weight: bold;
        }

        .answer-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .answer-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }

        .answer-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .answer-btn.correct {
            background: #4CAF50;
            border-color: #4CAF50;
        }

        .answer-btn.wrong {
            background: #f44336;
            border-color: #f44336;
        }

        .score {
            font-size: 1.2em;
            margin: 20px 0;
        }

        .play-btn {
            background: linear-gradient(45deg, #FF6B6B, #EE5A52);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .result {
            margin: 20px 0;
            font-size: 1.3em;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: white;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="title" id="gameTitle">Measurement Adventure</h1>
        <p class="subtitle" id="gameSubtitle">Learn measurements in English and Spanish!</p>
        
        <div class="language-toggle">
            <button class="lang-btn active" onclick="setLanguage('en')">🇺🇸 English</button>
            <button class="lang-btn" onclick="setLanguage('es')">🇪🇸 Español</button>
        </div>

        <div id="menuScreen">
            <div class="game-area">
                <h2 id="menuTitle">Welcome to Measurement Adventure!</h2>
                <p id="menuDescription">Test your knowledge of measurements in both English and Spanish.</p>
                <div style="margin: 30px 0;">
                    <div class="units-display">
                        <div class="unit-card">
                            <div class="unit-emoji">📏</div>
                            <div class="unit-name" id="meterName">Meter</div>
                        </div>
                        <div class="unit-card">
                            <div class="unit-emoji">📐</div>
                            <div class="unit-name" id="cmName">Centimeter</div>
                        </div>
                        <div class="unit-card">
                            <div class="unit-emoji">🦶</div>
                            <div class="unit-name" id="footName">Foot</div>
                        </div>
                        <div class="unit-card">
                            <div class="unit-emoji">📏</div>
                            <div class="unit-name" id="inchName">Inch</div>
                        </div>
                    </div>
                </div>
                <button class="play-btn" onclick="startGame()" id="playButton">Play Game</button>
            </div>
        </div>

        <div id="gameScreen" style="display: none;">
            <div class="score" id="scoreDisplay">Score: 0 | Level: 1</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 10%"></div>
            </div>
            
            <div class="game-area">
                <div class="question" id="questionText"></div>
                
                <div class="units-display">
                    <div class="unit-card">
                        <div class="unit-emoji" id="fromEmoji">📏</div>
                        <div class="unit-value" id="fromValue">10</div>
                        <div class="unit-name" id="fromUnit">m</div>
                    </div>
                    <div class="equals">=</div>
                    <div class="unit-card">
                        <div class="unit-emoji" id="toEmoji">📐</div>
                        <div class="unit-value" id="toValue">?</div>
                        <div class="unit-name" id="toUnit">cm</div>
                    </div>
                </div>

                <div class="answer-options" id="answerOptions"></div>
                
                <div class="result" id="resultText" style="display: none;"></div>
                
                <button class="play-btn" id="nextButton" onclick="nextQuestion()" style="display: none;">Next Question</button>
                <button class="play-btn" onclick="backToMenu()">Back to Menu</button>
            </div>
        </div>
    </div>

    <script>
        // Game data
        const measurements = {
            meter: { nameEn: 'Meter', nameEs: 'Metro', symbol: 'm', emoji: '📏', toMeter: 1 },
            centimeter: { nameEn: 'Centimeter', nameEs: 'Centímetro', symbol: 'cm', emoji: '📐', toMeter: 0.01 },
            foot: { nameEn: 'Foot', nameEs: 'Pie', symbol: 'ft', emoji: '🦶', toMeter: 0.3048 },
            inch: { nameEn: 'Inch', nameEs: 'Pulgada', symbol: 'in', emoji: '📏', toMeter: 0.0254 },
            kilometer: { nameEn: 'Kilometer', nameEs: 'Kilómetro', symbol: 'km', emoji: '🛣️', toMeter: 1000 },
            yard: { nameEn: 'Yard', nameEs: 'Yarda', symbol: 'yd', emoji: '🏈', toMeter: 0.9144 }
        };

        // Localization
        const translations = {
            en: {
                gameTitle: 'Measurement Adventure',
                gameSubtitle: 'Learn measurements in English and Spanish!',
                menuTitle: 'Welcome to Measurement Adventure!',
                menuDescription: 'Test your knowledge of measurements in both English and Spanish.',
                playButton: 'Play Game',
                score: 'Score',
                level: 'Level',
                question: 'How many {toUnit} are in {fromValue} {fromUnit}?',
                correct: 'Correct! 🎉',
                wrong: 'Try again! 🤔',
                nextQuestion: 'Next Question',
                backToMenu: 'Back to Menu',
                gameOver: 'Game Over!',
                finalScore: 'Final Score',
                playAgain: 'Play Again'
            },
            es: {
                gameTitle: 'Aventura de Medidas',
                gameSubtitle: '¡Aprende medidas en inglés y español!',
                menuTitle: '¡Bienvenido a Aventura de Medidas!',
                menuDescription: 'Pon a prueba tu conocimiento de medidas en inglés y español.',
                playButton: 'Jugar',
                score: 'Puntuación',
                level: 'Nivel',
                question: '¿Cuántos {toUnit} hay en {fromValue} {fromUnit}?',
                correct: '¡Correcto! 🎉',
                wrong: '¡Inténtalo de nuevo! 🤔',
                nextQuestion: 'Siguiente Pregunta',
                backToMenu: 'Volver al Menú',
                gameOver: '¡Juego Terminado!',
                finalScore: 'Puntuación Final',
                playAgain: 'Jugar de Nuevo'
            }
        };

        let currentLanguage = 'en';
        let score = 0;
        let level = 1;
        let currentQuestion = 0;
        let totalQuestions = 10;
        let currentFromUnit = null;
        let currentToUnit = null;
        let currentFromValue = 0;
        let correctAnswer = 0;
        let answerOptions = [];
        let gameStarted = false;

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLanguage];
            
            // Update menu
            document.getElementById('gameTitle').textContent = t.gameTitle;
            document.getElementById('gameSubtitle').textContent = t.gameSubtitle;
            document.getElementById('menuTitle').textContent = t.menuTitle;
            document.getElementById('menuDescription').textContent = t.menuDescription;
            document.getElementById('playButton').textContent = t.playButton;
            
            // Update measurement names
            Object.keys(measurements).forEach(key => {
                const measurement = measurements[key];
                const element = document.getElementById(key + 'Name');
                if (element) {
                    element.textContent = currentLanguage === 'en' ? measurement.nameEn : measurement.nameEs;
                }
            });

            if (gameStarted) {
                updateGameUI();
            }
        }

        function updateGameUI() {
            const t = translations[currentLanguage];
            document.getElementById('scoreDisplay').textContent = `${t.score}: ${score} | ${t.level}: ${level}`;
            document.getElementById('nextButton').textContent = t.nextQuestion;
        }

        function startGame() {
            gameStarted = true;
            score = 0;
            level = 1;
            currentQuestion = 0;
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion();
        }

        function generateQuestion() {
            const units = Object.keys(measurements);
            const fromKey = units[Math.floor(Math.random() * units.length)];
            let toKey = units[Math.floor(Math.random() * units.length)];
            
            // Make sure from and to are different
            while (toKey === fromKey) {
                toKey = units[Math.floor(Math.random() * units.length)];
            }

            currentFromUnit = measurements[fromKey];
            currentToUnit = measurements[toKey];
            currentFromValue = Math.floor(Math.random() * 50) + 1;
            
            // Calculate correct answer
            const fromMeters = currentFromValue * currentFromUnit.toMeter;
            correctAnswer = fromMeters / currentToUnit.toMeter;

            // Generate wrong answers
            answerOptions = [correctAnswer];
            for (let i = 0; i < 3; i++) {
                let wrongAnswer = correctAnswer * (0.5 + Math.random() * 1.5);
                wrongAnswer = Math.round(wrongAnswer * 100) / 100;
                if (!answerOptions.includes(wrongAnswer)) {
                    answerOptions.push(wrongAnswer);
                }
            }
            
            // Shuffle options
            answerOptions.sort(() => Math.random() - 0.5);

            displayQuestion();
        }

        function displayQuestion() {
            const t = translations[currentLanguage];
            
            // Update question text
            const questionText = t.question
                .replace('{toUnit}', currentToUnit.symbol)
                .replace('{fromValue}', currentFromValue)
                .replace('{fromUnit}', currentFromUnit.symbol);
            document.getElementById('questionText').textContent = questionText;

            // Update unit displays
            document.getElementById('fromEmoji').textContent = currentFromUnit.emoji;
            document.getElementById('fromValue').textContent = currentFromValue;
            document.getElementById('fromUnit').textContent = currentFromUnit.symbol;
            
            document.getElementById('toEmoji').textContent = currentToUnit.emoji;
            document.getElementById('toValue').textContent = '?';
            document.getElementById('toUnit').textContent = currentToUnit.symbol;

            // Update progress
            const progress = ((currentQuestion + 1) / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // Create answer buttons
            const optionsContainer = document.getElementById('answerOptions');
            optionsContainer.innerHTML = '';
            
            answerOptions.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'answer-btn';
                button.textContent = `${option.toFixed(2)} ${currentToUnit.symbol}`;
                button.onclick = () => selectAnswer(index, option);
                optionsContainer.appendChild(button);
            });

            // Hide result and next button
            document.getElementById('resultText').style.display = 'none';
            document.getElementById('nextButton').style.display = 'none';
        }

        function selectAnswer(index, selectedAnswer) {
            const buttons = document.querySelectorAll('.answer-btn');
            const isCorrect = Math.abs(selectedAnswer - correctAnswer) < 0.01;
            
            // Disable all buttons
            buttons.forEach(btn => btn.style.pointerEvents = 'none');
            
            // Show correct answer
            buttons.forEach((btn, i) => {
                const optionValue = answerOptions[i];
                if (Math.abs(optionValue - correctAnswer) < 0.01) {
                    btn.classList.add('correct');
                } else if (i === index) {
                    btn.classList.add('wrong');
                }
            });

            // Show result
            const t = translations[currentLanguage];
            const resultText = document.getElementById('resultText');
            resultText.textContent = isCorrect ? t.correct : t.wrong;
            resultText.style.display = 'block';
            
            if (isCorrect) {
                score += 10;
            }

            // Show next button
            document.getElementById('nextButton').style.display = 'block';
            updateGameUI();
        }

        function nextQuestion() {
            currentQuestion++;
            
            if (currentQuestion >= totalQuestions) {
                showGameOver();
            } else {
                level = Math.floor(currentQuestion / 3) + 1;
                generateQuestion();
            }
        }

        function showGameOver() {
            const t = translations[currentLanguage];
            const resultText = document.getElementById('resultText');
            resultText.innerHTML = `
                <div style="font-size: 1.5em; margin-bottom: 20px;">${t.gameOver}</div>
                <div style="font-size: 1.2em;">${t.finalScore}: ${score}</div>
            `;
            resultText.style.display = 'block';
            
            document.getElementById('nextButton').textContent = t.playAgain;
            document.getElementById('nextButton').onclick = () => {
                score = 0;
                level = 1;
                currentQuestion = 0;
                generateQuestion();
            };
        }

        function backToMenu() {
            gameStarted = false;
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('menuScreen').style.display = 'block';
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
